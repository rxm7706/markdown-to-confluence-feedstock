# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.6.1"

package:
  name: markdown-to-confluence
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/markdown-to-confluence/markdown_to_confluence-${{ version }}.tar.gz
  sha256: 2f5cc303310285a3089be0009a7688a5d2386fecb13542b9ae22d22a5ef60e45

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - md2conf = md2conf.__main__:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80.0
    - pip
  run:
    - python >=${{ python_min }},<4
    - cattrs >=26.1
    - lxml >=6.1
    - markdown >=3.10
    - orjson >=3.11
    - pymdown-extensions >=10.21
    - pyyaml >=6.0
    - requests >=2.33
    - truststore >=0.10
    - typing_extensions >=4.15
  run_constraints:
    - matplotlib >=3.10

tests:
  - python:
      imports:
        - md2conf
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - md2conf --help

about:
  summary: Publish Markdown files to Confluence wiki
  homepage: https://github.com/hunyadi/md2conf
  repository: https://github.com/hunyadi/md2conf
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
